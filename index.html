<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="一括管理">
<meta name="theme-color" content="#080b12">
<title>一括管理</title>
<style>
  :root{
    --bg:#080b12; --bg2:#0b1018;
    --surface:#121a28; --surface2:#18212f; --surface3:#212c3e;
    --hair:#243040; --hair2:#33415a;
    --ink:#f3f6fc; --soft:#a7b3ca; --faint:#6a778f;
    --brand:#6fb5ff; --brand2:#3286dc; --brandSoft:rgba(111,181,255,.12);
    --ok:#4ecfa0; --warn:#f2c14e; --danger:#f57373;
    --radius:20px;
    --sh-sm:0 2px 10px rgba(0,0,0,.28);
    --sh:0 16px 44px rgba(0,0,0,.46);
    --sh-brand:0 10px 26px rgba(50,134,220,.34);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;
    background:
      radial-gradient(1100px 520px at 82% -8%, rgba(111,181,255,.09), transparent 62%),
      radial-gradient(820px 480px at -8% 6%, rgba(78,207,160,.05), transparent 60%),
      linear-gradient(180deg,var(--bg),var(--bg2));
    background-attachment:fixed;
    color:var(--ink);line-height:1.62;letter-spacing:.1px;
    display:flex;flex-direction:column;height:100dvh;overflow:hidden;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:16px}
  .hidden{display:none!important}
  ::-webkit-scrollbar{width:7px;height:7px}
  ::-webkit-scrollbar-thumb{background:var(--hair2);border-radius:8px}
  svg{display:block;flex-shrink:0}
  .ic{stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* ---------- ロック/初回 ---------- */
  .screen{flex:1;display:flex;flex-direction:column;min-height:0}
  .center{align-items:center;justify-content:center;padding:26px;text-align:center}
  .card{background:linear-gradient(180deg,rgba(24,33,47,.92),rgba(11,16,24,.94));border:1px solid var(--hair);border-radius:26px;padding:36px 27px;max-width:420px;width:100%;box-shadow:var(--sh);backdrop-filter:blur(12px);animation:fadeUp .4s both}
  .brandmark{width:76px;height:76px;margin:0 auto 18px;border-radius:22px;display:flex;align-items:center;justify-content:center;color:#cfe6ff;background:linear-gradient(155deg,#274f7c,#0e1c30);border:1px solid var(--hair2);box-shadow:inset 0 1px 0 rgba(255,255,255,.09),0 10px 24px rgba(37,80,127,.32)}
  h1{font-size:23px;margin:0 0 6px;letter-spacing:2px;font-weight:800}
  .sub{color:var(--soft);font-size:14px;margin:0 0 22px}
  label{display:block;text-align:left;font-size:12.5px;color:var(--soft);margin:16px 0 7px;font-weight:700;letter-spacing:.3px}
  .field{width:100%;padding:15px 16px;background:var(--surface2);border:1px solid var(--hair);border-radius:14px;color:var(--ink);outline:none;transition:.16s}
  .field:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brandSoft)}
  .field::placeholder{color:var(--faint)}
  textarea.field{resize:vertical}
  .btn{width:100%;padding:16px;border-radius:15px;background:linear-gradient(180deg,var(--brand),var(--brand2));color:#03121f;font-weight:800;font-size:15px;margin-top:22px;transition:.14s;letter-spacing:.6px;box-shadow:var(--sh-brand)}
  .btn:active{transform:translateY(1px) scale(.99)}
  .btn.secondary{background:var(--surface2);border:1px solid var(--hair);color:var(--ink);box-shadow:none;font-weight:700}
  .btn.danger{background:rgba(245,115,115,.1);border:1px solid rgba(245,115,115,.34);color:#ffb0b0;box-shadow:none}
  .btn.ghost{background:transparent;color:var(--soft);margin-top:10px;font-weight:600;box-shadow:none}
  .btn.line{background:linear-gradient(180deg,#2b3b52,#1a2536);border:1px solid var(--hair2);color:var(--ink);box-shadow:var(--sh-sm)}
  .btn.withic{display:flex;align-items:center;justify-content:center;gap:10px}
  .err{color:var(--danger);font-size:13px;margin-top:12px;min-height:18px}
  .ok-text{color:var(--ok)!important}
  .hintbox{background:var(--surface2);border-radius:14px;padding:14px 16px;font-size:12px;color:var(--soft);text-align:left;margin-top:20px;border:1px solid var(--hair)}

  /* ---------- ヘッダー ---------- */
  header{display:flex;align-items:center;gap:10px;padding:calc(11px + env(safe-area-inset-top)) 15px 11px;background:linear-gradient(180deg,rgba(12,17,25,.86),rgba(12,17,25,.5));backdrop-filter:blur(16px);border-bottom:1px solid var(--hair);flex-shrink:0;position:relative;z-index:5}
  header .hmark{width:37px;height:37px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#bfe0ff;background:linear-gradient(155deg,#274f7c,#0e1c30);border:1px solid var(--hair2);box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}
  header .title{position:absolute;left:0;right:0;text-align:center;pointer-events:none;font-weight:800;font-size:15.5px;letter-spacing:1.5px;color:var(--ink)}
  .head-actions{margin-left:auto;display:flex;gap:8px}
  .iconbtn{width:41px;height:41px;border-radius:13px;background:var(--surface2);border:1px solid var(--hair);display:flex;align-items:center;justify-content:center;color:var(--soft);transition:.12s;position:relative}
  .iconbtn:active{background:var(--surface3);color:var(--ink)}
  .badge{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;padding:0 5px;border-radius:10px;background:var(--danger);color:#fff;font-size:10.5px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg2)}

  /* ---------- ビュー ---------- */
  .viewport{flex:1;min-height:0;position:relative;overflow:hidden}
  .view{position:absolute;inset:0;display:flex;flex-direction:column;min-height:0}
  .scroll{flex:1;overflow-y:auto;padding:20px 15px 22px;-webkit-overflow-scrolling:touch}

  /* ---------- ホーム ---------- */
  .home-search{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--hair);border-radius:16px;padding:14px 16px;margin-bottom:20px;box-shadow:var(--sh-sm);transition:.14s;color:var(--soft)}
  .home-search:focus-within{border-color:var(--brand)}
  .home-search input{flex:1;background:none;border:none;outline:none;color:var(--ink);font-size:15px}
  .search-top{padding:16px 15px 8px;border-bottom:1px solid var(--hair);flex-shrink:0}
  .search-top .home-search{margin-bottom:12px;box-shadow:none}
  .search-top .cat-strip{margin-bottom:0}
  .sec-title{font-size:11px;color:var(--faint);font-weight:800;letter-spacing:1.6px;margin:6px 3px 14px;display:flex;align-items:center;justify-content:space-between;text-transform:uppercase}
  .sec-title .link{color:var(--brand);font-weight:700;font-size:12.5px;letter-spacing:.2px;text-transform:none;display:flex;align-items:center;gap:3px}

  .alertcard{display:flex;align-items:center;gap:13px;padding:14px 16px;border-radius:16px;margin-bottom:16px;background:linear-gradient(180deg,rgba(242,193,78,.12),rgba(242,193,78,.05));border:1px solid rgba(242,193,78,.3);animation:fadeUp .3s both}
  .alertcard.crit{background:linear-gradient(180deg,rgba(245,115,115,.12),rgba(245,115,115,.05));border-color:rgba(245,115,115,.34)}
  .alertcard .ico{color:var(--warn);display:flex}
  .alertcard.crit .ico{color:var(--danger)}
  .alertcard .t{flex:1;font-size:13px}
  .alertcard .go{font-size:12.5px;color:var(--brand);font-weight:800;white-space:nowrap;display:flex;align-items:center;gap:2px}

  .people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(106px,1fr));gap:13px}
  .person-card{background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--hair);border-radius:19px;padding:18px 12px;display:flex;flex-direction:column;align-items:center;gap:11px;transition:.15s;box-shadow:var(--sh-sm);animation:fadeUp .3s both}
  .person-card:active{transform:scale(.97);border-color:var(--hair2)}
  .avatar{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:800;color:#04121f;position:relative;box-shadow:inset 0 -7px 14px rgba(0,0,0,.18),0 4px 12px rgba(0,0,0,.24)}
  .avatar::after{content:"";position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(255,255,255,.15)}
  .person-card .pname{font-size:14px;font-weight:700;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .person-card .pcount{font-size:11.5px;color:var(--soft)}
  .person-card.add{background:var(--surface2);border:1px dashed var(--hair2);justify-content:center}
  .person-card.add .avatar{background:var(--surface3);color:var(--brand);box-shadow:none}
  .person-card.add .avatar::after{border-color:transparent}

  .cat-strip{display:flex;gap:10px;overflow-x:auto;padding:2px 0 8px;margin-bottom:8px;scrollbar-width:none}
  .cat-strip::-webkit-scrollbar{display:none}
  .cat-pill{display:flex;align-items:center;gap:8px;padding:10px 15px;border-radius:999px;white-space:nowrap;background:var(--surface2);border:1px solid var(--hair);font-size:13px;font-weight:600;flex-shrink:0;transition:.12s;box-shadow:var(--sh-sm);color:var(--soft)}
  .cat-pill .dot{width:9px;height:9px;border-radius:50%}
  .cat-pill.active{background:var(--brandSoft);border-color:var(--brand);color:#e2f1ff}

  .detail-head{display:flex;align-items:center;gap:14px;margin-bottom:20px;animation:fadeUp .3s both}
  .backbtn{width:41px;height:41px;border-radius:13px;background:var(--surface2);border:1px solid var(--hair);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--soft)}
  .detail-head .avatar{width:48px;height:48px;font-size:19px}
  .detail-head .dn{font-size:20px;font-weight:800}
  .detail-head .ds{font-size:12px;color:var(--soft)}

  /* ---------- エントリーカード ---------- */
  .entry{background:linear-gradient(180deg,var(--surface),var(--bg2));border:1px solid var(--hair);border-radius:18px;margin-bottom:13px;overflow:hidden;transition:.15s;box-shadow:var(--sh-sm);animation:fadeUp .3s both}
  .entry:active{border-color:var(--hair2)}
  .entry .ehead{display:flex;align-items:center;gap:13px;padding:15px 16px;width:100%;text-align:left}
  .entry .ci{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}
  .entry .em{flex:1;min-width:0}
  .entry .es{font-size:15.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .entry .esub{font-size:11.5px;color:var(--soft);display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:2px}
  .entry .chev{color:var(--faint);transition:.25s;flex-shrink:0;display:flex}
  .entry.open .chev{transform:rotate(180deg)}
  .entry .ebody{max-height:0;overflow:hidden;transition:max-height .3s ease}
  .entry .ebody-inner{padding:2px 13px 13px}
  .secret-row{display:flex;align-items:center;gap:8px;padding:11px 13px;margin-bottom:9px;background:var(--surface2);border:1px solid var(--hair);border-radius:13px}
  .secret-row .lbl{font-size:10.5px;color:var(--soft);min-width:52px;font-weight:700;letter-spacing:.2px}
  .secret-row .val{flex:1;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:14.5px;letter-spacing:.3px;word-break:break-word;white-space:pre-wrap}
  .secret-row .val.masked{letter-spacing:3px;color:var(--soft)}
  .mini{width:37px;height:37px;border-radius:11px;background:var(--surface);border:1px solid var(--hair);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.1s;color:var(--soft)}
  .mini:active{background:var(--brand);color:#04121f;transform:scale(.92)}
  .meta-row{display:flex;flex-wrap:wrap;gap:6px;margin:3px 0 5px;align-items:center}
  .tag{padding:4px 10px;border-radius:999px;background:var(--surface2);border:1px solid var(--hair);font-size:11px;color:var(--soft);display:inline-flex;align-items:center;gap:5px}
  .tag.warn{background:rgba(242,193,78,.13);color:var(--warn);border-color:transparent}
  .tag.danger{background:rgba(245,115,115,.13);color:var(--danger);border-color:transparent}
  .tag.ok{background:rgba(78,207,160,.12);color:var(--ok);border-color:transparent}
  .rowlink{display:inline-flex;align-items:center;gap:7px;color:var(--brand);font-size:12.5px;font-weight:700;margin:4px 0}
  .editlink{display:inline-flex;align-items:center;gap:7px;color:var(--brand);font-size:12.5px;font-weight:800;padding:9px 2px 3px}
  .empty{text-align:center;color:var(--soft);padding:56px 20px;animation:fadeUp .3s both}
  .empty .eico{color:var(--faint);margin-bottom:16px;display:flex;justify-content:center}

  /* ---------- さがす結果 ---------- */
  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{padding:10px 15px;border-radius:999px;background:var(--surface2);border:1px solid var(--hair);font-size:13px;color:var(--brand);font-weight:600;transition:.1s}
  .chip:active{background:var(--brand);color:#04121f}

  /* ---------- ボトムナビ ---------- */
  .bottomnav{display:flex;flex-shrink:0;background:linear-gradient(180deg,rgba(12,17,25,.7),rgba(12,17,25,.97));backdrop-filter:blur(16px);border-top:1px solid var(--hair);padding-bottom:env(safe-area-inset-bottom)}
  .navtab{flex:1;padding:11px 0 12px;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--faint);font-size:10.5px;font-weight:800;letter-spacing:.4px;transition:.12s}
  .navtab.active{color:var(--brand)}
  .navadd{flex:0 0 auto;padding:0 10px;display:flex;align-items:center}
  .navadd button{width:58px;height:58px;margin-top:-16px;border-radius:50%;background:linear-gradient(180deg,var(--brand),var(--brand2));color:#03121f;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 24px rgba(50,134,220,.5)}
  .navadd button:active{transform:scale(.93)}

  /* ---------- モーダル ---------- */
  .modal{position:fixed;inset:0;background:rgba(2,5,11,.68);display:flex;align-items:flex-end;justify-content:center;z-index:60;backdrop-filter:blur(4px);animation:fadeUp .2s both}
  @media(min-width:560px){.modal{align-items:center}}
  .sheet{background:linear-gradient(180deg,var(--surface),var(--bg2));width:100%;max-width:540px;max-height:94dvh;overflow-y:auto;border-radius:26px 26px 0 0;border:1px solid var(--hair);padding:8px 20px calc(24px + env(safe-area-inset-bottom));box-shadow:var(--sh)}
  @media(min-width:560px){.sheet{border-radius:26px}}
  .grabber{width:42px;height:4px;border-radius:4px;background:var(--hair2);margin:9px auto 8px}
  .sheet h2{display:flex;align-items:center;justify-content:space-between;font-size:19px;margin:6px 0 16px;font-weight:800}
  .sheet .x{width:37px;height:37px;border-radius:12px;background:var(--surface2);border:1px solid var(--hair);display:flex;align-items:center;justify-content:center;color:var(--soft)}
  .row2{display:flex;gap:12px}.row2>div{flex:1;min-width:0}
  .cat-select{display:flex;flex-wrap:wrap;gap:9px;margin-top:3px}
  .cat-opt{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:13px;background:var(--surface2);border:1px solid var(--hair);font-size:13px;font-weight:600;transition:.12s}
  .cat-opt .ci2{width:23px;height:23px;border-radius:8px;display:flex;align-items:center;justify-content:center}
  .cat-opt.sel{border-color:var(--brand);background:var(--brandSoft);color:#e2f1ff}
  .cat-opt.addc{border-style:dashed;color:var(--brand)}
  .seg{display:flex;gap:8px;margin-top:3px}
  .seg button{flex:1;padding:11px 6px;border-radius:12px;background:var(--surface2);border:1px solid var(--hair);font-size:12.5px;font-weight:700;color:var(--soft);transition:.12s;display:flex;align-items:center;justify-content:center;gap:5px}
  .seg button.sel{border-color:var(--brand);background:var(--brandSoft);color:#e2f1ff}
  .person-select{display:flex;flex-wrap:wrap;gap:9px;margin-top:3px}
  .p-opt{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:999px;background:var(--surface2);border:1px solid var(--hair);font-size:13px;font-weight:600}
  .p-opt .dotv{width:21px;height:21px;border-radius:50%;font-size:11px;color:#04121f;display:flex;align-items:center;justify-content:center;font-weight:800}
  .p-opt.sel{border-color:var(--brand);background:var(--brandSoft)}
  .p-opt.addp{border-style:dashed;color:var(--brand);display:flex;align-items:center;gap:6px}
  .genrow{display:flex;gap:9px;margin-top:9px}
  .genrow button{flex:1;padding:11px;background:var(--surface2);border:1px solid var(--hair);border-radius:12px;font-size:12.5px;color:var(--brand);font-weight:700;display:flex;align-items:center;justify-content:center;gap:7px}
  .valwrap{position:relative}
  .valwrap .eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:35px;height:35px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--soft)}
  .strength{height:6px;border-radius:6px;background:var(--surface3);margin-top:9px;overflow:hidden}
  .strength>i{display:block;height:100%;width:0;border-radius:6px;transition:.25s}
  .strength-label{font-size:11px;color:var(--soft);margin-top:6px}
  .manage-cat{display:flex;align-items:center;gap:11px;padding:10px 12px;background:var(--surface2);border:1px solid var(--hair);border-radius:13px;margin-bottom:9px}
  .notif-item{display:flex;align-items:center;gap:12px;padding:13px;border-radius:14px;margin-bottom:10px;border:1px solid var(--hair);width:100%;text-align:left}
  .notif-item.warn{background:rgba(242,193,78,.08);border-color:rgba(242,193,78,.26)}
  .notif-item.danger{background:rgba(245,115,115,.08);border-color:rgba(245,115,115,.28)}
  .notif-item .ni2{display:flex}
  .notif-item.warn .ni2{color:var(--warn)}.notif-item.danger .ni2{color:var(--danger)}
  .notif-item .nt{flex:1;font-size:13px}
  .divider{height:1px;background:var(--hair);margin:22px 0}
  .small{font-size:12px;color:var(--soft)}
  .switchrow{display:flex;align-items:center;justify-content:space-between;padding:13px 0;gap:13px}
  .switch{width:52px;height:31px;border-radius:999px;background:var(--surface3);position:relative;flex-shrink:0;transition:.16s;border:1px solid var(--hair)}
  .switch.on{background:var(--brand2)}
  .switch i{position:absolute;top:3px;left:3px;width:23px;height:23px;border-radius:50%;background:#fff;transition:.18s}
  .switch.on i{left:24px}
  .searchbox{width:100%;padding:13px 15px;background:var(--surface2);border:1px solid var(--hair);border-radius:14px;color:var(--ink);outline:none;margin-bottom:13px}
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--ok);color:#04231a;padding:12px 22px;border-radius:999px;font-size:13px;font-weight:800;z-index:99;box-shadow:var(--sh);animation:pop .2s}
  @keyframes pop{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
  a{color:var(--brand)}
</style>
</head>
<body>

<!-- 初回設定 -->
<div id="screen-setup" class="screen center hidden">
  <div class="card">
    <div class="brandmark"><svg class="ic" width="34" height="34" viewBox="0 0 24 24" stroke-width="1.6"><rect x="3" y="11" width="18" height="11" rx="2.5"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></div>
    <h1>一括管理</h1>
    <p class="sub">家族の大切な情報を、ひとつに。<br>まずこの金庫を開ける鍵を決めます。</p>
    <label>マスターパスワード</label>
    <input id="setup-pw1" class="field" type="password" autocomplete="new-password" placeholder="長めのパスワードを推奨">
    <label>もう一度入力</label>
    <input id="setup-pw2" class="field" type="password" autocomplete="new-password" placeholder="確認のため再入力">
    <label>ヒント（任意・忘れた時用）</label>
    <input id="setup-hint" class="field" type="text" placeholder="例: いつもの〇〇＋数字">
    <div class="err" id="setup-err"></div>
    <button class="btn" id="setup-go">この鍵で始める</button>
    <div class="hintbox">このパスワードは端末の外に一切保存されません。<br><b>忘れると中身は誰にも（開発者にも）復元できません。</b>紙に書いて安全な場所に保管してください。</div>
  </div>
</div>

<!-- ロック解除 -->
<div id="screen-lock" class="screen center hidden">
  <div class="card">

const CAT_ICON={bank:"bank",card:"card",subscription:"refresh",insurance:"shield",pension:"wallet",sns:"message",shop:"cart",work:"briefcase",medical:"heart",other:"box"};
function icon(name,size=20,sw=1.7){const p=ICONS[name]||ICONS.tag;return `<svg class="ic" width="${size}" height="${size}" viewBox="0 0 24 24" stroke-width="${sw}">${p}</svg>`}
function catIconName(cat){return CAT_ICON[cat.id]||"tag"}

/* ---------- 暗号コア ---------- */
function buf2b64(b){return btoa(String.fromCharCode(...new Uint8Array(b)))}
function b642buf(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function deriveKey(pw,salt,iter){const bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:iter,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},true,["encrypt","decrypt"])}
async function encJSON(k,o){const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv},k,enc.encode(JSON.stringify(o)));return{iv:buf2b64(iv),ct:buf2b64(ct)}}
async function decJSON(k,p){const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b642buf(p.iv)},k,b642buf(p.ct));return JSON.parse(dec.decode(pt))}
function readRaw(){try{return JSON.parse(localStorage.getItem(STORE_KEY))}catch(e){return null}}
async function persist(){const raw=readRaw();raw.data=await encJSON(CRYPTO_KEY,VAULT);localStorage.setItem(STORE_KEY,JSON.stringify(raw))}

/* ---------- 項目ごとの共有（別の共有パスワードで暗号化） ---------- */
async function encryptShare(password,bundle){const salt=crypto.getRandomValues(new Uint8Array(16));const key=await deriveKey(password,salt,PBKDF2_ITER);const p=await encJSON(key,bundle);return{type:"kinko-share",v:1,salt:buf2b64(salt),iter:PBKDF2_ITER,iv:p.iv,ct:p.ct}}
async function decryptShare(password,file){const key=await deriveKey(password,b642buf(file.salt),file.iter||PBKDF2_ITER);return await decJSON(key,{iv:file.iv,ct:file.ct})}
/* ---------- 個人ロック（人ごとの追加パスで二重暗号化） ---------- */
let personalKeys={}; // セッション中だけメモリ保持
function hasPersonalLock(p){return !!(VAULT.locks&&VAULT.locks[p])}
function getPersonalKey(p){return personalKeys[p]||null}
async function createPersonalLock(person,pw){const salt=crypto.getRandomValues(new Uint8Array(16));const key=await deriveKey(pw,salt,PBKDF2_ITER);const verifier=await encJSON(key,{check:"OK"});VAULT.locks=VAULT.locks||{};VAULT.locks[person]={salt:buf2b64(salt),iter:PBKDF2_ITER,verifier};personalKeys[person]=key;return key}
async function unlockPersonal(person,pw){const L=VAULT.locks[person];const key=await deriveKey(pw,b642buf(L.salt),L.iter);await decJSON(key,L.verifier);personalKeys[person]=key;return key}
async function decLockedEntry(e){const k=getPersonalKey(e.owner);if(!k||!e.enc)return null;try{return await decJSON(k,e.enc)}catch(x){return null}}

function mergeShared(bundle){
  const byId=new Map(VAULT.entries.map(e=>[e.id,e]));let added=0,updated=0;
  (bundle.entries||[]).forEach(inc=>{inc.shared=true;const cur=byId.get(inc.id);if(!cur){VAULT.entries.push(inc);added++}else{if((inc.updatedAt||"")>=(cur.updatedAt||"")){Object.assign(cur,inc);updated++}}});
  (bundle.categories||[]).forEach(c=>{if(!VAULT.categories.some(x=>x.id===c.id))VAULT.categories.splice(Math.max(0,VAULT.categories.length-1),0,c)});
  return{added,updated};
}
function migrate(){
  if(!VAULT.settings)VAULT.settings={mask:true};
  if(!VAULT.settings.title)VAULT.settings.title=APP_TITLE_DEFAULT;
  if(!VAULT.locks)VAULT.locks={};
  if(!VAULT.categories)VAULT.categories=JSON.parse(JSON.stringify(DEFAULT_CATS));
  ["subscription","medical","other"].forEach(id=>{if(!VAULT.categories.some(c=>c.id===id)){const d=DEFAULT_CATS.find(c=>c.id===id);if(id==="other")VAULT.categories.push(d);else VAULT.categories.splice(Math.max(0,VAULT.categories.length-1),0,d)}});
  VAULT.entries.forEach(e=>{if(!e.category)e.category="other"});
}
async function createVault(pw,hint){const salt=crypto.getRandomValues(new Uint8Array(16));const key=await deriveKey(pw,salt,PBKDF2_ITER);const verifier=await encJSON(key,{check:"OK"});VAULT={entries:[],categories:JSON.parse(JSON.stringify(DEFAULT_CATS)),locks:{},settings:{mask:true,title:APP_TITLE_DEFAULT}};const data=await encJSON(key,VAULT);localStorage.setItem(STORE_KEY,JSON.stringify({v:4,salt:buf2b64(salt),iter:PBKDF2_ITER,hint:hint||"",verifier,data}));CRYPTO_KEY=key}
async function unlock(pw){const raw=readRaw();if(!raw)throw new Error("no-vault");const key=await deriveKey(pw,b642buf(raw.salt),raw.iter||PBKDF2_ITER);await decJSON(key,raw.verifier);CRYPTO_KEY=key;VAULT=await decJSON(key,raw.data);migrate()}

/* ---------- 生体認証 ---------- */
function bioEnabled(){return !!localStorage.getItem(BIO_KEY)}
function disableBiometric(){localStorage.removeItem(BIO_KEY)}
function rpIdOrNull(){const h=location.hostname;return h?h:null}
async function getPRF(credId,rpId){const pk={challenge:crypto.getRandomValues(new Uint8Array(32)),allowCredentials:[{type:"public-key",id:credId,transports:["internal"]}],userVerification:"required",timeout:60000,extensions:{prf:{eval:{first:PRF_SALT}}}};if(rpId)pk.rpId=rpId;const a=await navigator.credentials.get({publicKey:pk});const r=a.getClientExtensionResults();if(!r||!r.prf||!r.prf.results||!r.prf.results.first)return null;return new Uint8Array(r.prf.results.first)}
async function prfToKey(prf){return crypto.subtle.importKey("raw",prf,{name:"AES-GCM"},false,["encrypt","decrypt"])}
async function enableBiometric(){if(!window.PublicKeyCredential)throw new Error("unsupported");const rpId=rpIdOrNull();const rp=rpId?{name:"かんたん金庫",id:rpId}:{name:"かんたん金庫"};const cred=await navigator.credentials.create({publicKey:{challenge:crypto.getRandomValues(new Uint8Array(32)),rp,user:{id:crypto.getRandomValues(new Uint8Array(16)),name:"kinko-user",displayName:"かんたん金庫"},pubKeyCredParams:[{type:"public-key",alg:-7},{type:"public-key",alg:-257}],authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required",residentKey:"required"},timeout:60000,extensions:{prf:{}}}});const prf=await getPRF(cred.rawId,rpId);if(!prf)throw new Error("no-prf");const k=await prfToKey(prf);const raw=await crypto.subtle.exportKey("raw",CRYPTO_KEY);const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv},k,raw);localStorage.setItem(BIO_KEY,JSON.stringify({credId:buf2b64(cred.rawId),rpId:rpId||"",iv:buf2b64(iv),wrapped:buf2b64(ct)}))}
async function unlockBiometric(){const bio=JSON.parse(localStorage.getItem(BIO_KEY));const prf=await getPRF(b642buf(bio.credId),bio.rpId||null);if(!prf)throw new Error("no-prf");const k=await prfToKey(prf);const raw=await crypto.subtle.decrypt({name:"AES-GCM",iv:b642buf(bio.iv)},k,b642buf(bio.wrapped));CRYPTO_KEY=await crypto.subtle.importKey("raw",raw,{name:"AES-GCM"},true,["encrypt","decrypt"]);VAULT=await decJSON(CRYPTO_KEY,readRaw().data);migrate()}

/* ---------- 画面/ロック ---------- */
function show(id){["screen-setup","screen-lock","screen-app"].forEach(s=>document.getElementById(s).classList.toggle("hidden",s!==id))}
function resetAutolock(){clearTimeout(autolockTimer);if(CRYPTO_KEY)autolockTimer=setTimeout(lockNow,AUTOLOCK_MS)}
function showLock(){show("screen-lock");const b=document.getElementById("lock-bio");document.getElementById("lock-hintbox").classList.add("hidden");if(bioEnabled()){b.classList.remove("hidden");setTimeout(tryBiometricUnlock,350)}else{b.classList.add("hidden");document.getElementById("lock-pw").focus()}}
function lockNow(){CRYPTO_KEY=null;VAULT=null;personalKeys={};clearTimeout(autolockTimer);document.querySelectorAll(".modal").forEach(m=>m.remove());const sr=document.getElementById("search-results");if(sr)sr.innerHTML="";const si=document.getElementById("search-input");if(si)si.value="";searchFilter="all";document.getElementById("lock-pw").value="";document.getElementById("lock-err").textContent="";showLock()}
["click","keydown","touchstart"].forEach(ev=>document.addEventListener(ev,()=>{if(CRYPTO_KEY)resetAutolock()},{passive:true}));

/* ---------- ユーティリティ ---------- */
function esc(s){return (s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function catOf(id){return VAULT.categories.find(c=>c.id===id)||{id:"other",label:"その他",color:"#7c8aa5"}}
function personColor(name){let h=0;for(const c of (name||"?"))h=(h*31+c.charCodeAt(0))%360;return `linear-gradient(145deg,hsl(${h} 66% 64%),hsl(${(h+28)%360} 60% 50%))`}
function initial(name){return (name||"?").trim().charAt(0)||"?"}
function expiryInfo(e){if(!e.expiry)return null;const t=new Date();t.setHours(0,0,0,0);const x=new Date(e.expiry+"T00:00:00");const d=Math.round((x-t)/86400000);if(d<0)return{cls:"danger",text:`期限切れ ${-d}日前`,days:d,urgent:true};if(d===0)return{cls:"danger",text:"今日が期限",days:0,urgent:true};if(d<=SOON_DAYS)return{cls:"warn",text:`あと${d}日で期限`,days:d,urgent:true};return{cls:"ok",text:`期限 ${e.expiry}`,days:d,urgent:false}}
function urgentList(){return VAULT.entries.map(e=>({e,i:expiryInfo(e)})).filter(x=>x.i&&x.i.urgent).sort((a,b)=>a.i.days-b.i.days)}
function notifMessage(e){const i=expiryInfo(e);if(!i)return"";if(i.days<0)return`「${e.service}（${e.person}）」は ${-i.days}日前に期限が切れています`;if(i.days===0)return`「${e.service}（${e.person}）」は 今日が期限です`;return`「${e.service}（${e.person}）」が 残り${i.days}日で期限切れです`}

function strength(v){if(!v)return{score:0,label:"",color:"#7c8aa5"};let s=0;if(v.length>=8)s++;if(v.length>=12)s++;if(/[a-z]/.test(v)&&/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;s=Math.min(s,4);const map=[{l:"とても弱い",c:"#f57373"},{l:"弱い",c:"#f57373"},{l:"ふつう",c:"#f2c14e"},{l:"強い",c:"#4ecfa0"},{l:"とても強い",c:"#4ecfa0"}];return{score:s,label:map[s].l,color:map[s].c}}
function genPassword(len){const sets="ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#%&*?";return Array.from(crypto.getRandomValues(new Uint8Array(len)),b=>sets[b%sets.length]).join("")}

async function copyText(t){try{if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(t)}else{const ta=document.createElement("textarea");ta.value=t;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove()}toast("コピーしました")}catch(e){toast("コピーできませんでした")}}
function toast(m){const t=document.createElement("div");t.className="toast";t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),1400)}

   ========================================================= */
function wireSecrets(root,body){
  root.querySelectorAll(".btn-reveal").forEach(b=>b.addEventListener("click",ev=>{ev.stopPropagation();const row=b.closest(".secret-row"),val=row.querySelector(".val"),hid=val.classList.contains("masked");val.classList.toggle("masked");val.textContent=hid?row.dataset.val:"••••••••";b.innerHTML=icon(hid?"eyeOff":"eye",18);if(body)body.style.maxHeight=body.scrollHeight+40+"px"}));
  root.querySelectorAll(".btn-copy").forEach(b=>b.addEventListener("click",ev=>{ev.stopPropagation();copyText(b.closest(".secret-row").dataset.val)}));
}
function secretRowsHTML(type,value,loginId,mask){
  return `<div class="secret-row" data-val="${esc(value)}"><span class="lbl">${esc(type||"値")}</span><span class="val ${mask?'masked':''}">${mask?"••••••••":esc(value)}</span><button class="mini btn-reveal">${icon(mask?"eye":"eyeOff",18)}</button><button class="mini btn-copy">${icon("copy",18)}</button></div>${loginId?`<div class="secret-row" data-val="${esc(loginId)}"><span class="lbl">ID</span><span class="val">${esc(loginId)}</span><button class="mini btn-copy">${icon("copy",18)}</button></div>`:""}`;
}
function buildEntryCard(e,{open=false}={}){
  const cat=catOf(e.category),exp=expiryInfo(e),mask=VAULT.settings.mask&&e.category!=="medical";
  const updated=e.updatedAt?new Date(e.updatedAt).toLocaleDateString("ja-JP"):"";
  const card=document.createElement("div");card.className="entry"+(open?" open":"");
  card.innerHTML=`
    <button class="ehead">
      <div class="ci" style="background:${cat.color}22;color:${cat.color}">${icon(catIconName(cat),20)}</div>
      <div class="em"><div class="es">${esc(e.service)}</div>
        <div class="esub"><span>${esc(e.person)}</span><span>·</span><span>${esc(e.type)}</span>${e.locked?`<span class="tag" style="padding:2px 8px;color:var(--brand)">${icon("lock",12)} 個人</span>`:""}${exp&&exp.urgent?`<span class="tag ${exp.cls}" style="padding:2px 8px">${exp.text}</span>`:""}</div></div>
      <span class="chev">${icon("chevDown",18)}</span>
    </button>
    <div class="ebody"><div class="ebody-inner">
      <div class="secret-area"></div>
      <div class="meta-row">
        <span class="tag" style="color:${cat.color}">${icon(catIconName(cat),13)} ${esc(cat.label)}</span>
        ${exp?`<span class="tag ${exp.cls}">${icon("clock",13)} ${exp.text}</span>`:""}
        ${e.shared?`<span class="tag" style="color:var(--brand)">${icon("users",13)} 共有</span>`:""}
        ${e.locked?`<span class="tag" style="color:var(--brand)">${icon("lock",13)} 個人ロック</span>`:""}
        ${updated?`<span class="tag">更新 ${updated}</span>`:""}
        ${e.history&&e.history.length?`<span class="tag">履歴 ${e.history.length}</span>`:""}
      </div>
      ${e.url?`<a class="rowlink" href="${esc(e.url)}" target="_blank" rel="noopener">${icon("link",15)} サイトを開く</a>`:""}
      ${e.memo?`<div class="small" style="margin:4px 0;display:flex;gap:6px;align-items:flex-start">${icon("note",14)}<span>${esc(e.memo)}</span></div>`:""}
      <button class="editlink">${icon("edit",15)} 編集・更新する</button>
    </div></div>`;
  const body=card.querySelector(".ebody"),area=card.querySelector(".secret-area");
  const recalc=()=>{if(card.classList.contains("open"))body.style.maxHeight=body.scrollHeight+40+"px"};
  function fillSecret(){
    if(!e.locked){area.innerHTML=secretRowsHTML(e.type,e.value,e.loginId,mask);wireSecrets(area,body);return}
    const key=getPersonalKey(e.owner);
    if(!key){area.innerHTML=`<div class="secret-row"><span class="lbl">${esc(e.type||"値")}</span><span class="val masked">個人ロック中</span><button class="mini btn-unlock" title="本人パスで表示">${icon("lock",18)}</button></div><div class="small" style="margin:2px 0 4px">${esc(e.owner)}さん本人のパスワードで表示できます</div>`;area.querySelector(".btn-unlock").addEventListener("click",async ev=>{ev.stopPropagation();const k=await askEnterPersonal(e.owner);if(k){fillSecret();recalc()}});return}
    area.innerHTML=`<div class="secret-row"><span class="lbl">${esc(e.type||"値")}</span><span class="val">読み込み中…</span></div>`;
    decLockedEntry(e).then(obj=>{if(!obj){area.innerHTML=`<div class="small" style="color:var(--danger)">表示できませんでした</div>`;return}area.innerHTML=secretRowsHTML(e.type,obj.value,obj.loginId,mask);wireSecrets(area,body);recalc()});
  }
  fillSecret();
  card.querySelector(".ehead").addEventListener("click",()=>{const o=card.classList.toggle("open");body.style.maxHeight=o?body.scrollHeight+40+"px":"0"});
  if(open)requestAnimationFrame(()=>{body.style.maxHeight=body.scrollHeight+40+"px"});
  card.querySelector(".editlink").addEventListener("click",ev=>{ev.stopPropagation();openEditor(e.id)});
  return card;
}

/* ---------- 個人パスワードの入力/作成モーダル ---------- */
function askCreatePersonal(person){return new Promise(res=>{
  const m=document.createElement("div");m.className="modal";
  m.innerHTML=`<div class="sheet"><div class="grabber"></div><h2>${esc(person)}さんの個人パスワード<button class="x" data-close>${icon("x",16)}</button></h2>
    <p class="small">${esc(person)}さんの「個人ロック」項目を守る追加パスワードを決めます。家族共有の入口パスワードとは別に、本人だけが知る値にしてください。<b>忘れると個人ロック項目は開けません。</b></p>
    <label>個人パスワード</label><input id="pc-1" class="field" type="password" autocomplete="new-password">
    <label>もう一度</label><input id="pc-2" class="field" type="password" autocomplete="new-password">
    <div class="err" id="pc-e"></div><button class="btn" data-go>設定する</button></div>`;
  document.body.appendChild(m);const done=v=>{m.remove();res(v)};
  m.addEventListener("click",ev=>{if(ev.target===m)done(null)});m.querySelector("[data-close]").addEventListener("click",()=>done(null));
  m.querySelector("[data-go]").addEventListener("click",async ()=>{const a=m.querySelector("#pc-1").value,b=m.querySelector("#pc-2").value,e=m.querySelector("#pc-e");e.textContent="";if(a.length<4){e.textContent="4文字以上にしてください";return}if(a!==b){e.textContent="2つが一致しません";return}const k=await createPersonalLock(person,a);done(k)});
  setTimeout(()=>m.querySelector("#pc-1").focus(),60);
})}
function askEnterPersonal(person){return new Promise(res=>{
  if(!hasPersonalLock(person)){res(null);return}
  const m=document.createElement("div");m.className="modal";
  m.innerHTML=`<div class="sheet"><div class="grabber"></div><h2>${esc(person)}さんの本人確認<button class="x" data-close>${icon("x",16)}</button></h2>
    <p class="small">${esc(person)}さんの個人パスワードを入力すると、個人ロックの項目が表示できます（このセッション中は再入力不要）。</p>
    <label>個人パスワード</label><input id="pe-1" class="field" type="password" autocomplete="current-password">
    <div class="err" id="pe-e"></div><button class="btn" data-go>表示する</button></div>`;
  document.body.appendChild(m);const done=v=>{m.remove();res(v)};
  m.addEventListener("click",ev=>{if(ev.target===m)done(null)});m.querySelector("[data-close]").addEventListener("click",()=>done(null));
  async function go(){const p=m.querySelector("#pe-1").value,e=m.querySelector("#pe-e");e.textContent="";try{const k=await unlockPersonal(person,p);done(k)}catch(x){e.textContent="パスワードが違います"}}
  m.querySelector("[data-go]").addEventListener("click",go);
  m.querySelector("#pe-1").addEventListener("keydown",ev=>{if(ev.key==="Enter")go()});
  setTimeout(()=>m.querySelector("#pe-1").focus(),60);
})}

  const list=urgentList();const m=document.createElement("div");m.className="modal";
  m.innerHTML=`<div class="sheet"><div class="grabber"></div><h2>お知らせ<button class="x" data-close>${icon("x",16)}</button></h2><p class="small" style="margin-top:-6px">期限が近い・切れている項目のお知らせです。</p><div id="notif-body" style="margin-top:14px"></div></div>`;
  document.body.appendChild(m);const close=()=>m.remove();m.addEventListener("click",ev=>{if(ev.target===m)close()});m.querySelector("[data-close]").addEventListener("click",close);

function personList(){const map={};VAULT.entries.forEach(e=>{const k=e.person||"（未設定）";map[k]=(map[k]||0)+1});return Object.keys(map).sort((a,b)=>a.localeCompare(b,"ja")).map(name=>({name,count:map[name]}))}

/* ---------- さがす ---------- */
function normalize(s){return (s||"").toString().toLowerCase().replace(/[ぁ-ん]/g,c=>String.fromCharCode(c.charCodeAt(0)+0x60)).replace(/[Ａ-Ｚａ-ｚ０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[\s　・_\-]/g,"")}
const STOP=["の","は","を","が","に","で","と","って","です","ですか","教えて","おしえて","なに","何","？","?","、","。","もの","ある"];
function extractTerms(q){let s=q;STOP.forEach(w=>s=s.split(w).join(" "));return s.split(/[\s　]+/).map(t=>t.trim()).filter(Boolean)}
function scoreEntry(e,qn,terms){const hay=normalize([e.person,e.service,e.type,catOf(e.category).label,e.memo,e.url].join(" "));let sc=0;if(qn.length>1&&hay.includes(qn))sc+=5;for(const t of terms){const tn=normalize(t);if(!tn)continue;if(normalize(e.service).includes(tn))sc+=4;if(normalize(e.person).includes(tn))sc+=3;if(normalize(catOf(e.category).label).includes(tn))sc+=3;if(normalize(e.type).includes(tn))sc+=2;if(normalize(e.memo).includes(tn))sc+=1}return sc}
function renderSearchFilters(){
  const strip=document.getElementById("search-filters");strip.innerHTML="";
  const mk=(key,label,dot,ico)=>{const b=document.createElement("button");b.className="cat-pill"+(searchFilter===key?" active":"");b.innerHTML=`${ico?icon(ico,14):dot?`<span class="dot" style="background:${dot}"></span>`:""}${label}`;b.addEventListener("click",()=>{searchFilter=key;renderSearchFilters();applySearch()});return b};
  strip.appendChild(mk("all","すべて","var(--brand)"));
  strip.appendChild(mk("expiry","期限が近い",null,"clock"));
  [...new Set(VAULT.entries.map(e=>e.person).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"ja")).forEach(p=>strip.appendChild(mk("person:"+p,esc(p),null)));
}
function applySearch(){
  const q=document.getElementById("search-input").value.trim();const box=document.getElementById("search-results");box.innerHTML="";
  let list;
  if(searchFilter==="expiry"){list=VAULT.entries.map(e=>({e,i:expiryInfo(e)})).filter(x=>x.i).sort((a,b)=>a.i.days-b.i.days).map(x=>x.e)}
  else if(searchFilter.indexOf("person:")===0){const p=searchFilter.slice(7);list=VAULT.entries.filter(e=>(e.person||"")===p).sort((a,b)=>(a.service||"").localeCompare(b.service||"","ja"))}
  else{list=VAULT.entries.slice().sort((a,b)=>(a.person||"").localeCompare(b.person||"","ja")||(a.service||"").localeCompare(b.service||"","ja"))}
  if(q){const qn=normalize(q),terms=extractTerms(q);list=list.map(e=>({e,s:scoreEntry(e,qn,terms)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).map(x=>x.e)}
  if(searchFilter==="expiry"&&!q){const urg=list.map(e=>({e,i:expiryInfo(e)})).filter(x=>x.i&&x.i.urgent);if(urg.length){const crit=urg.some(x=>x.i.cls==="danger");const note=document.createElement("div");note.className="alertcard"+(crit?" crit":"");note.innerHTML=`<span class="ico">${icon(crit?"alert":"clock",21)}</span><span class="t"><b>${urg.length}件</b>が期限切れ／期限間近です</span>`;box.appendChild(note)}}
  if(list.length===0){const em=document.createElement("div");em.className="empty";em.innerHTML=`<div class="eico">${icon("search",44,1.4)}</div><div>${q?"該当する登録がありません":"登録がありません"}</div>`;box.appendChild(em);return}
  list.forEach(e=>box.appendChild(buildEntryCard(e)));
}
function renderSearch(){renderSearchFilters();applySearch()}

    <label>この項目の扱い</label>
    <div class="seg" id="ed-mode">
      <button type="button" data-mode="private">${icon("box",14)} 共有しない</button>
      <button type="button" data-mode="shared">${icon("users",14)} みんなで共有</button>
      <button type="button" data-mode="locked">${icon("lock",14)} 個人ロック</button>
    </div>
    <div class="small" id="mode-desc" style="margin-top:6px"></div>
    ${editing&&e.history&&e.history.length?`<div class="small" style="margin-top:12px">変更履歴 ${e.history.length}件（前回の値も安全に保持）</div>`:""}
    <button class="btn" data-save>${editing?"更新して保存":"登録する"}</button>
    ${editing?`<button class="btn danger withic" data-del>${icon("trash",18)} この項目を削除</button>`:""}
    <div class="err" id="ed-err"></div></div>`;
  document.body.appendChild(m);
  const close=()=>m.remove();m.addEventListener("click",ev=>{if(ev.target===m)close()});m.querySelector("[data-close]").addEventListener("click",close);

  const pc=m.querySelector("#ed-people");
  function renderPeople(){pc.innerHTML="";people.forEach(p=>{const b=document.createElement("button");b.type="button";b.className="p-opt"+(editorSel.person===p?" sel":"");b.innerHTML=`<span class="dotv" style="background:${personColor(p)}">${esc(initial(p))}</span>${esc(p)}`;b.addEventListener("click",()=>{editorSel.person=p;renderPeople()});pc.appendChild(b)});const add=document.createElement("button");add.type="button";add.className="p-opt addp";add.innerHTML=`${icon("plus",15)} 新しい人`;add.addEventListener("click",()=>{const n=prompt("だれの情報ですか？（例：お父さん）");if(n&&n.trim()){const nm=n.trim();if(!people.includes(nm))people.push(nm);editorSel.person=nm;renderPeople()}});pc.appendChild(add)}
  renderPeople();

  const cc=m.querySelector("#ed-cats");
  function renderCats(){cc.innerHTML="";VAULT.categories.forEach(cat=>{const b=document.createElement("button");b.type="button";b.className="cat-opt"+(editorSel.cat===cat.id?" sel":"");b.innerHTML=`<span class="ci2" style="background:${cat.color}22;color:${cat.color}">${icon(catIconName(cat),15)}</span>${esc(cat.label)}`;b.addEventListener("click",()=>{const cur=m.querySelector("#f-value");if(cur)curVal=cur.value;editorSel.cat=cat.id;renderCats();renderValueSection()});cc.appendChild(b)});const add=document.createElement("button");add.type="button";add.className="cat-opt addc";add.innerHTML=`${icon("plus",15)} 分類を追加`;add.addEventListener("click",async ()=>{const label=prompt("新しい分類の名前（例：習い事）");if(!label||!label.trim())return;const palette=["#4ecfa0","#f472b6","#6fb5ff","#f2c14e","#7ac8ff","#a78bfa","#ff8fab","#5eead4"];VAULT.categories.push({id:"c"+Date.now(),label:label.trim(),color:palette[VAULT.categories.length%palette.length]});await persist();editorSel.cat=VAULT.categories[VAULT.categories.length-1].id;renderCats()});cc.appendChild(add)}
  renderCats();

  let curVal=plainValue;
  function currentType(){return m.querySelector("#f-type").value}
  function updS(){const bar=m.querySelector("#str-bar");if(!bar)return;const v=m.querySelector("#f-value").value;const s=strength(v);bar.style.width=(s.score/4*100)+"%";bar.style.background=s.color;m.querySelector("#str-label").textContent=v?`強度: ${s.label}`:""}
  function renderValueSection(){
    const sec=m.querySelector("#value-section");const textMode=isTextMode(editorSel.cat,currentType());
    if(textMode){
      sec.innerHTML=`<label>内容（既往歴・詳細など）</label><textarea id="f-value" class="field" rows="4" placeholder="例：2018年 高血圧で〇〇内科に通院／小麦アレルギー など">${esc(curVal)}</textarea>`;
    }else{
      sec.innerHTML=`<label>値（パスワード・番号など）</label><div class="valwrap"><input id="f-value" class="field" type="text" value="${esc(curVal)}" placeholder="ここに実際の値を入力" autocomplete="off" style="padding-right:46px"><button class="eye" id="f-eye" type="button">${icon("eye",18)}</button></div><div class="strength"><i id="str-bar"></i></div><div class="strength-label" id="str-label"></div><div class="genrow"><button data-gen="12" type="button">${icon("shuffle",15)} 12桁を生成</button><button data-gen="16" type="button">${icon("shuffle",15)} 16桁を生成</button></div>`;
    }
    const val=sec.querySelector("#f-value");
    val.addEventListener("input",()=>{curVal=val.value;updS()});
    if(!textMode){
      const eye=sec.querySelector("#f-eye");
      eye.addEventListener("click",()=>{const t=val.type==="password";val.type=t?"text":"password";eye.innerHTML=icon(t?"eyeOff":"eye",18)});
      sec.querySelectorAll("[data-gen]").forEach(b=>b.addEventListener("click",()=>{val.value=genPassword(parseInt(b.dataset.gen));curVal=val.value;val.type="text";eye.innerHTML=icon("eyeOff",18);updS()}));
      updS();
    }
  }
  renderValueSection();
  m.querySelector("#f-type").addEventListener("change",()=>{const cur=m.querySelector("#f-value");if(cur)curVal=cur.value;renderValueSection()});
  const modeDescs={private:"このアプリを開けた家族なら見られます（共有ファイルには含まれません）",shared:"「共有用に書き出す」に含まれ、家族と共有できます",locked:"本人の個人パスワードが無いと、家族でもこの項目の中身は見られません"};
  function renderMode(){m.querySelectorAll("#ed-mode button").forEach(b=>b.classList.toggle("sel",b.dataset.mode===editorMode));m.querySelector("#mode-desc").textContent=modeDescs[editorMode]}
  m.querySelectorAll("#ed-mode button").forEach(b=>b.addEventListener("click",()=>{editorMode=b.dataset.mode;renderMode()}));
  renderMode();

  m.querySelector("[data-save]").addEventListener("click",async ()=>{
    const person=editorSel.person.trim(),service=m.querySelector("#f-service").value.trim(),value=m.querySelector("#f-value").value,loginId=m.querySelector("#f-loginid").value.trim();
    const errEl=m.querySelector("#ed-err");errEl.textContent="";
    if(!person){errEl.textContent="「だれの」を選ぶか、＋新しい人 で追加してください";return}
    if(!service||!value){errEl.textContent="「何の」「値」は必須です";return}
    let encObj=null;
    if(editorMode==="locked"){
      if(!hasPersonalLock(person)){const k=await askCreatePersonal(person);if(!k){errEl.textContent="個人パスワードの設定が必要です";return}}
      else if(!getPersonalKey(person)){const k=await askEnterPersonal(person);if(!k){errEl.textContent="本人のパスワードが必要です";return}}
      encObj=await encJSON(getPersonalKey(person),{value,loginId});
    }
    const now=new Date().toISOString();
    const base={person,service,category:editorSel.cat,type:m.querySelector("#f-type").value,url:m.querySelector("#f-url").value.trim(),expiry:m.querySelector("#f-expiry").value,memo:m.querySelector("#f-memo").value.trim(),updatedAt:now};
    if(editorMode==="locked"){Object.assign(base,{locked:true,owner:person,shared:false,enc:encObj,value:"",loginId:""})}
    else{Object.assign(base,{locked:false,owner:"",shared:editorMode==="shared",enc:null,value,loginId})}
    if(editing){
      if(!e.locked&&editorMode!=="locked"&&e.value!==value){e.history=e.history||[];e.history.unshift({value:e.value,changedAt:e.updatedAt||now});if(e.history.length>10)e.history.length=10}
      Object.assign(e,base);
    }else{VAULT.entries.push(Object.assign({id:(crypto.randomUUID?crypto.randomUUID():String(Date.now())+Math.random()),createdAt:now,history:[]},base))}
    await persist();close();toast(editing?"更新しました":"登録しました");updateNotifBadge();if(currentTab==="home")renderHome();else renderSearch();
  });
  if(editing)m.querySelector("[data-del]").addEventListener("click",async ()=>{if(!confirm("この項目を削除します。よろしいですか？"))return;VAULT.entries=VAULT.entries.filter(x=>x.id!==id);await persist();close();toast("削除しました");updateNotifBadge();if(currentTab==="home")renderHome();else renderSearch()});
  setTimeout(()=>m.querySelector("#f-service").focus(),60);
}

/* ---------- 共有: 書き出し / 取り込み ---------- */
function openShareExport(){
  const shared=VAULT.entries.filter(e=>e.shared);
  if(shared.length===0){alert("「家族と共有する」をオンにした項目がありません。\n各項目の編集画面でオンにしてから、もう一度お試しください。");return}
  const m=document.createElement("div");m.className="modal";
  m.innerHTML=`<div class="sheet"><div class="grabber"></div><h2>共有用に書き出す<button class="x" data-close>${icon("x",16)}</button></h2>
    <p class="small">共有する項目: <b>${shared.length}件</b>。家族で決める「共有パスワード」で暗号化します（各自のマスターパスワードとは別でOK）。受け取る人には、このパスワードを口頭など安全な方法で伝えてください。</p>
    <label>共有パスワード</label><input id="sh-p1" class="field" type="password" autocomplete="new-password">
    <label>もう一度</label><input id="sh-p2" class="field" type="password" autocomplete="new-password">
    <div class="err" id="sh-err"></div>
    <button class="btn" data-go>暗号化して書き出す</button></div>`;
  document.body.appendChild(m);const close=()=>m.remove();m.addEventListener("click",ev=>{if(ev.target===m)close()});m.querySelector("[data-close]").addEventListener("click",close);
  m.querySelector("[data-go]").addEventListener("click",async ()=>{
    const p1=m.querySelector("#sh-p1").value,p2=m.querySelector("#sh-p2").value,err=m.querySelector("#sh-err");err.textContent="";
    if(p1.length<4){err.textContent="共有パスワードは4文字以上に";return}
    if(p1!==p2){err.textContent="2つのパスワードが一致しません";return}
    const usedCatIds=new Set(shared.map(e=>e.category));
    const bundle={entries:JSON.parse(JSON.stringify(shared)),categories:VAULT.categories.filter(c=>usedCatIds.has(c.id))};
    const file=await encryptShare(p1,bundle);
    const blob=new Blob([JSON.stringify(file)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`kinko-share-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);
    close();toast(`${shared.length}件を書き出しました`);
  });
  setTimeout(()=>m.querySelector("#sh-p1").focus(),60);
}
function openShareImport(file){
  const r=new FileReader();
  r.onload=()=>{
    let parsed;try{parsed=JSON.parse(r.result)}catch(e){alert("読み込めないファイルです");return}
    if(!parsed||parsed.type!=="kinko-share"){alert("これは共有ファイルではありません。\n「共有用に書き出す」で作ったファイルを選んでください。");return}
    const m=document.createElement("div");m.className="modal";
    m.innerHTML=`<div class="sheet"><div class="grabber"></div><h2>共有ファイルを取り込む<button class="x" data-close>${icon("x",16)}</button></h2>
      <p class="small">受け取った「共有パスワード」を入力してください。今あるデータは消えず、共有された項目が追加・更新されます。</p>
      <label>共有パスワード</label><input id="im-p" class="field" type="password" autocomplete="current-password">
      <div class="err" id="im-err"></div>
      <button class="btn" data-go>取り込む</button></div>`;
    document.body.appendChild(m);const close=()=>m.remove();m.addEventListener("click",ev=>{if(ev.target===m)close()});m.querySelector("[data-close]").addEventListener("click",close);
    m.querySelector("[data-go]").addEventListener("click",async ()=>{
      const p=m.querySelector("#im-p").value,err=m.querySelector("#im-err");err.textContent="";
      let bundle;try{bundle=await decryptShare(p,parsed)}catch(e){err.textContent="共有パスワードが違います";return}
      const res=mergeShared(bundle);await persist();close();toast(`追加 ${res.added}件・更新 ${res.updated}件を取り込みました`);updateNotifBadge();if(currentTab==="home")renderHome();else renderSearch();
    });
    setTimeout(()=>m.querySelector("#im-p").focus(),60);
  };
  r.readAsText(file);
}

/* =========================================================
   設定
   ========================================================= */
function openSettings(){
  const m=document.createElement("div");m.className="modal";const fileCtx=location.protocol==="file:";
  m.innerHTML=`<div class="sheet"><div class="grabber"></div>
    <h2>設定<button class="x" data-close>${icon("x",16)}</button></h2>
    <label>アプリの名前</label><input id="s-title" class="field" value="${esc(VAULT.settings.title||APP_TITLE_DEFAULT)}" placeholder="例: 一括管理、わが家の記録">
    <div class="switchrow" style="margin-top:6px"><div><b>値を最初は隠す</b><div class="small">結果表示で伏せ字にする</div></div><div class="switch ${VAULT.settings.mask?'on':''}" id="s-mask"><i></i></div></div>
    <div class="switchrow"><div><b>顔／指紋で解除</b><div class="small" id="bio-desc">${fileCtx?"生体認証はWebアドレス（https）から開いた時に使えます":"この端末で顔／指紋を使って素早く解除"}</div></div><div class="switch ${bioEnabled()?'on':''}" id="s-bio"><i></i></div></div>
    <div class="divider"></div>
    <b>分類の管理</b><div id="cat-manage" style="margin-top:12px"></div><button class="btn secondary withic" id="cat-add">${icon("plus",18)} 分類を追加</button>
    <div class="divider"></div>
    <b>家族と共有（項目ごと）</b>
    <p class="small">各項目の「家族と共有する」をオンにした分だけを、家族で決めた<b>共有パスワード</b>で暗号化して書き出せます。受け取った人が取り込むと、今のデータは消えず、共有された項目だけが追加・更新されます。自分だけの項目は含まれません。</p>
    <button class="btn secondary withic" data-share-export>${icon("download",18)} 共有用に書き出す（共有ONのみ）</button>
    <button class="btn secondary withic" data-share-import>${icon("upload",18)} 共有ファイルを取り込む</button>
    <input type="file" id="share-file" accept="application/json,.json" class="hidden">

    <div class="divider"></div>
    <b>丸ごとバックアップ ／ 引っ越し</b>
    <p class="small">全データを暗号化ファイルにして保存し、別のパソコンで「復元する」を押すと丸ごと同じ中身を引き継げます（マスターパスワードが無いと開けません）。</p>
    <button class="btn secondary withic" data-export>${icon("download",18)} バックアップを書き出す</button>
    <button class="btn secondary withic" data-import>${icon("upload",18)} バックアップから復元する</button>
    <input type="file" id="import-file" accept="application/json,.json" class="hidden">
    <div class="divider"></div>
    <b>マスターパスワードの変更</b>
    <label>現在のパスワード</label><input id="cp-old" class="field" type="password" autocomplete="current-password">
    <label>新しいパスワード</label><input id="cp-new" class="field" type="password" autocomplete="new-password">
    <button class="btn secondary" data-chpw>パスワードを変更する</button>
    <div class="err" id="set-err"></div>
    <div class="divider"></div>
    <p class="small">保存場所: この端末のブラウザ内のみ（AES-GCM暗号化・PBKDF2 31万回）。ネットには送信していません。自動ロック: 無操作5分。</p>
  </div>`;
  document.body.appendChild(m);const close=()=>m.remove();m.addEventListener("click",ev=>{if(ev.target===m)close()});m.querySelector("[data-close]").addEventListener("click",close);

  const stt=m.querySelector("#s-title");
  stt.addEventListener("input",()=>{VAULT.settings.title=stt.value.trim()||APP_TITLE_DEFAULT;applyTitle()});
  stt.addEventListener("change",async ()=>{VAULT.settings.title=stt.value.trim()||APP_TITLE_DEFAULT;applyTitle();await persist();toast("名前を変えました")});
  const sw=m.querySelector("#s-mask");sw.addEventListener("click",async ()=>{VAULT.settings.mask=!VAULT.settings.mask;sw.classList.toggle("on",VAULT.settings.mask);await persist()});
  const bsw=m.querySelector("#s-bio"),bdesc=m.querySelector("#bio-desc");
  bsw.addEventListener("click",async ()=>{if(bioEnabled()){disableBiometric();bsw.classList.remove("on");bdesc.textContent="この端末で顔／指紋を使って素早く解除";toast("生体認証をオフにしました");return}try{bdesc.textContent="認証を登録しています…";await enableBiometric();bsw.classList.add("on");bdesc.textContent="この端末で顔／指紋で解除できます";toast("生体認証をオンにしました")}catch(err){bsw.classList.remove("on");bdesc.textContent=location.protocol==="file:"?"ファイルを直接開くと使えません。Webアドレス（https）から開くと使えます":"この環境では生体認証を利用できませんでした"}});

  const cm=m.querySelector("#cat-manage");
  function renderCatManage(){cm.innerHTML="";VAULT.categories.forEach(cat=>{const used=VAULT.entries.filter(e=>e.category===cat.id).length;const row=document.createElement("div");row.className="manage-cat";row.innerHTML=`<span class="ci2" style="width:31px;height:31px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:${cat.color}22;color:${cat.color}">${icon(catIconName(cat),16)}</span><span style="flex:1;font-size:14px;font-weight:600">${esc(cat.label)}</span><span class="small">${used}件</span><button class="mini">${icon("trash",16)}</button>`;row.querySelector(".mini").addEventListener("click",async ()=>{if(used>0){if(!confirm(`「${cat.label}」を削除すると、${used}件は「その他」に移動します。よろしいですか？`))return;VAULT.entries.forEach(e=>{if(e.category===cat.id)e.category="other"})}VAULT.categories=VAULT.categories.filter(c=>c.id!==cat.id);await persist();renderCatManage()});cm.appendChild(row)})}
  renderCatManage();
  m.querySelector("#cat-add").addEventListener("click",async ()=>{const label=prompt("新しい分類の名前（例：習い事）");if(!label||!label.trim())return;const palette=["#4ecfa0","#f472b6","#6fb5ff","#f2c14e","#7ac8ff","#a78bfa","#ff8fab","#5eead4"];VAULT.categories.push({id:"c"+Date.now(),label:label.trim(),color:palette[VAULT.categories.length%palette.length]});await persist();renderCatManage()});

  m.querySelector("[data-share-export]").addEventListener("click",openShareExport);
  m.querySelector("[data-share-import]").addEventListener("click",()=>m.querySelector("#share-file").click());
  m.querySelector("#share-file").addEventListener("change",ev=>{const f=ev.target.files[0];if(f)openShareImport(f);ev.target.value=""});

  m.querySelector("[data-export]").addEventListener("click",()=>{const raw=localStorage.getItem(STORE_KEY);const blob=new Blob([raw],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`kinko-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);toast("書き出しました")});
  m.querySelector("[data-import]").addEventListener("click",()=>m.querySelector("#import-file").click());
  m.querySelector("#import-file").addEventListener("change",ev=>{const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=async ()=>{try{const p=JSON.parse(r.result);if(!p.salt||!p.verifier||!p.data)throw 0;if(!confirm("現在のデータをこのバックアップで置き換えます。よろしいですか？"))return;localStorage.setItem(STORE_KEY,r.result);disableBiometric();toast("復元しました。ロックし直します");setTimeout(lockNow,600)}catch(e){alert("読み込めないファイルです")}};r.readAsText(f)});

  m.querySelector("[data-chpw]").addEventListener("click",async ()=>{const oldp=m.querySelector("#cp-old").value,newp=m.querySelector("#cp-new").value,errEl=m.querySelector("#set-err");errEl.classList.remove("ok-text");errEl.textContent="";if(newp.length<6){errEl.textContent="新しいパスワードは6文字以上に";return}try{const raw=readRaw();const tk=await deriveKey(oldp,b642buf(raw.salt),raw.iter);await decJSON(tk,raw.verifier);const salt=crypto.getRandomValues(new Uint8Array(16));const key=await deriveKey(newp,salt,PBKDF2_ITER);const verifier=await encJSON(key,{check:"OK"});const data=await encJSON(key,VAULT);localStorage.setItem(STORE_KEY,JSON.stringify({v:4,salt:buf2b64(salt),iter:PBKDF2_ITER,hint:raw.hint||"",verifier,data}));CRYPTO_KEY=key;disableBiometric();m.querySelector("#s-bio").classList.remove("on");errEl.classList.add("ok-text");errEl.textContent="変更しました（生体認証は登録し直してください）";toast("パスワードを変更しました")}catch(e){errEl.textContent="現在のパスワードが違います"}});
}

/* ---------- 起動 ---------- */
function applyTitle(){const t=(VAULT&&VAULT.settings&&VAULT.settings.title)||APP_TITLE_DEFAULT;const el=document.querySelector("header .title");if(el)el.textContent=t}
function enterApp(){show("screen-app");applyTitle();resetAutolock();currentTab="home";switchTab("home");updateNotifBadge()}
function boot(){const raw=readRaw();if(!raw){show("screen-setup");document.getElementById("setup-pw1").focus()}else showLock()}
async function tryBiometricUnlock(){const err=document.getElementById("lock-err");err.textContent="";try{await unlockBiometric();document.getElementById("lock-pw").value="";enterApp()}catch(e){if(!(e&&e.name==="NotAllowedError"))err.textContent="生体認証に失敗しました。パスワードで解除してください。";document.getElementById("lock-pw").focus()}}

document.getElementById("setup-go").addEventListener("click",async ()=>{const p1=document.getElementById("setup-pw1").value,p2=document.getElementById("setup-pw2").value,hint=document.getElementById("setup-hint").value.trim();const err=document.getElementById("setup-err");err.textContent="";if(p1.length<6){err.textContent="6文字以上にしてください（長いほど安全）";return}if(p1!==p2){err.textContent="2つのパスワードが一致しません";return}await createVault(p1,hint);enterApp()});
async function doUnlock(){const p=document.getElementById("lock-pw").value,err=document.getElementById("lock-err");err.textContent="";try{await unlock(p);document.getElementById("lock-pw").value="";enterApp()}catch(e){err.textContent="パスワードが違います"}}
document.getElementById("lock-go").addEventListener("click",doUnlock);
document.getElementById("lock-pw").addEventListener("keydown",e=>{if(e.key==="Enter")doUnlock()});
document.getElementById("lock-bio").addEventListener("click",tryBiometricUnlock);
document.getElementById("lock-hint").addEventListener("click",()=>{const raw=readRaw();const box=document.getElementById("lock-hintbox");box.classList.remove("hidden");box.textContent=raw&&raw.hint?"ヒント: "+raw.hint:"ヒントは設定されていません"});
document.getElementById("search-input").addEventListener("input",applySearch);
document.getElementById("btn-add").addEventListener("click",()=>openEditor());
document.getElementById("btn-notif").addEventListener("click",openNotifications);
document.getElementById("btn-settings").addEventListener("click",openSettings);
document.getElementById("btn-lock").addEventListener("click",lockNow);
document.querySelectorAll(".navtab").forEach(b=>b.addEventListener("click",()=>switchTab(b.dataset.tab)));

boot();
</script>
</body>
